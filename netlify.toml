# ── Netlify configuration ────────────────────────────────────────
# Locks build command, publish directory, and Node version so
# every clone of this template deploys consistently.
# Security headers live in public/_headers.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Deploy-preview context — match production build behaviour.
[context.deploy-preview]
  command = "npm run build"

# Branch-deploy context — match production build behaviour.
[context.branch-deploy]
  command = "npm run build"
